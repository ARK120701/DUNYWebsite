<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — Darul Uloom New York</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0C1F3D;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(201,162,39,0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(30,60,114,0.6) 0%, transparent 60%);
      padding: 1.5rem;
    }

    .login-card {
      background: #fff;
      border-radius: 16px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.4);
      overflow: hidden;
    }

    .login-header {
      background: linear-gradient(135deg, #0C1F3D, #1e3a8a);
      padding: 2.5rem 2rem 2rem;
      text-align: center;
      position: relative;
    }
    .login-header::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0; right: 0;
      height: 30px;
      background: #fff;
      border-radius: 50% 50% 0 0 / 100% 100% 0 0;
    }
    .login-logo {
      width: 56px;
      height: 56px;
      background: rgba(201,162,39,0.15);
      border: 2px solid rgba(201,162,39,0.4);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
    }
    .login-logo i { color: #C9A227; font-size: 1.4rem; }
    .login-header h1 {
      font-family: 'Playfair Display', serif;
      color: #fff;
      font-size: 1.4rem;
      margin-bottom: 0.25rem;
    }
    .login-header p {
      color: rgba(255,255,255,0.55);
      font-size: 0.8rem;
    }

    .login-body {
      padding: 2rem 2rem 2.5rem;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }
    .form-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: #555;
      margin-bottom: 0.45rem;
      letter-spacing: 0.03em;
    }
    .input-wrap {
      position: relative;
    }
    .input-wrap i.input-icon {
      position: absolute;
      left: 0.9rem;
      top: 50%;
      transform: translateY(-50%);
      color: #aaa;
      font-size: 0.85rem;
      pointer-events: none;
    }
    .input-wrap input {
      width: 100%;
      padding: 0.75rem 2.75rem 0.75rem 2.5rem;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      font-size: 0.92rem;
      font-family: 'Poppins', sans-serif;
      color: #333;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      background: #fafafa;
    }
    .input-wrap input:focus {
      border-color: #C9A227;
      box-shadow: 0 0 0 3px rgba(201,162,39,0.12);
      background: #fff;
    }
    .toggle-pw {
      position: absolute;
      right: 0.9rem;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #bbb;
      font-size: 0.85rem;
      transition: color 0.2s;
    }
    .toggle-pw:hover { color: #777; }

    .error-msg {
      display: none;
      background: #fef2f2;
      border: 1px solid #fca5a5;
      color: #dc2626;
      border-radius: 8px;
      padding: 0.65rem 0.9rem;
      font-size: 0.82rem;
      margin-bottom: 1.25rem;
      align-items: center;
      gap: 0.5rem;
    }
    .error-msg.visible { display: flex; }

    .login-btn {
      width: 100%;
      padding: 0.85rem;
      background: #0C1F3D;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    .login-btn:hover { background: #1e3a8a; }
    .login-btn:active { transform: scale(0.99); }
    .login-btn .spinner {
      display: none;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    .login-btn.loading .spinner { display: block; }
    .login-btn.loading .btn-text { display: none; }

    @keyframes spin { to { transform: rotate(360deg); } }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 1.25rem;
      font-size: 0.8rem;
      color: #aaa;
      text-decoration: none;
      transition: color 0.2s;
    }
    .back-link:hover { color: #555; }
    .back-link i { margin-right: 0.3rem; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-header">
      <div class="login-logo"><i class="fas fa-mosque"></i></div>
      <h1>Darul Iftāʾ Admin</h1>
      <p>Darul Uloom New York</p>
    </div>

    <div class="login-body">
      <div class="error-msg" id="error-msg">
        <i class="fas fa-exclamation-circle"></i>
        <span id="error-text">Incorrect password. Please try again.</span>
      </div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label>Username</label>
          <div class="input-wrap">
            <i class="fas fa-user input-icon"></i>
            <input type="text" id="username" placeholder="Enter username" autocomplete="username" />
          </div>
        </div>

        <div class="form-group">
          <label>Password</label>
          <div class="input-wrap">
            <i class="fas fa-lock input-icon"></i>
            <input type="password" id="password" placeholder="Enter password" autocomplete="current-password" />
            <span class="toggle-pw" onclick="togglePw()">
              <i class="fas fa-eye" id="pw-eye"></i>
            </span>
          </div>
        </div>

        <button type="submit" class="login-btn" id="login-btn">
          <div class="spinner"></div>
          <span class="btn-text"><i class="fas fa-sign-in-alt"></i> Sign In</span>
        </button>
      </form>

      <a href="../index.html" class="back-link">
        <i class="fas fa-arrow-left"></i> Back to website
      </a>
    </div>
  </div>

  <script>
    // Credentials — change as needed
    const ADMIN_USER = 'admin';
    const ADMIN_PASS = 'duny2025';

    // If already logged in, go straight to dashboard
    if (sessionStorage.getItem('duny_admin') === '1') {
      window.location.href = 'dashboard.html';
    }

    function togglePw() {
      const inp = document.getElementById('password');
      const eye = document.getElementById('pw-eye');
      if (inp.type === 'password') {
        inp.type = 'text';
        eye.className = 'fas fa-eye-slash';
      } else {
        inp.type = 'password';
        eye.className = 'fas fa-eye';
      }
    }

    document.getElementById('login-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const err = document.getElementById('error-msg');
      const user = document.getElementById('username').value.trim();
      const pass = document.getElementById('password').value;

      err.classList.remove('visible');
      btn.classList.add('loading');

      setTimeout(() => {
        btn.classList.remove('loading');
        if (user === ADMIN_USER && pass === ADMIN_PASS) {
          sessionStorage.setItem('duny_admin', '1');
          window.location.href = 'dashboard.html';
        } else {
          err.classList.add('visible');
          document.getElementById('password').value = '';
          document.getElementById('password').focus();
        }
      }, 600);
    });
  </script>
</body>
</html>
